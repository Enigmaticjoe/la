# Brain AI Dashboard - Docker Compose Integration

# Add this to your main docker-compose.yml file in the brain-project

version: '3.8'

services:
  # ... your existing services ...

  # Brain AI System Dashboard
  dashboard:
    build: ./services/dashboard
    container_name: brain-dashboard
    ports:
      - "8080:80"
    networks:
      - brain-network
    restart: unless-stopped
    environment:
      - TZ=UTC
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost/health"]
      interval: 30s
      timeout: 3s
      start_period: 5s
      retries: 3
    labels:
      - "com.brain.service=dashboard"
      - "com.brain.description=Web Dashboard for Brain AI System"
    depends_on:
      - vllm
      - qdrant
      - embeddings
      - openwebui

networks:
  brain-network:
    driver: bridge

# Quick Start Commands:
# 
# Build and run:
#   docker compose up -d dashboard
#
# View logs:
#   docker logs -f brain-dashboard
#
# Rebuild:
#   docker compose up -d --build dashboard
#
# Access dashboard:
#   http://localhost:8080
#   or http://YOUR_IP:8080
