# node-a/homepage/settings.yaml
# Homepage dashboard global settings for Node A
# Docs: https://gethomepage.dev/latest/configs/settings/

title: Node A — Project Chimera
description: AI inference stack | 192.168.1.9 | RX 7900 XT

# Theme
theme: dark
color: slate

# Background image (optional — comment out to use solid color)
# background: https://images.unsplash.com/photo-1518770660439-4636190af475?w=1920

# Layout
layout:
  AI Inference:
    style: row
    columns: 3
  Chat & RAG:
    style: row
    columns: 2
  Storage & Cache:
    style: row
    columns: 2
  Monitoring:
    style: row
    columns: 1

# Target for links — use _blank to open in new tab
target: _blank

# Show status dot next to each service
statusStyle: dot
