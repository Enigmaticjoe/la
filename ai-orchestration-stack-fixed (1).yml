version: '3.8'

networks:
  ai_internal:
    driver: bridge
    ipam:
      config:
        - subnet: 172.25.0.0/16

services:
  # Vector Database - Qdrant
  qdrant:
    image: qdrant/qdrant:v1.16.0
    container_name: qdrant
    restart: unless-stopped
    networks:
      ai_internal:
        ipv4_address: 172.25.0.10
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - /mnt/qdrant/storage:/qdrant/storage
      - /mnt/qdrant/snapshots:/qdrant/snapshots
    environment:
      - QDRANT__SERVICE__HTTP_PORT=6333
      - QDRANT__SERVICE__GRPC_PORT=6334

  # LLM Inference Engine - vLLM
  vllm:
    image: vllm/vllm-openai:v0.6.5
    container_name: vllm
    restart: unless-stopped
    networks:
      ai_internal:
        ipv4_address: 172.25.0.20
    ports:
      - "8002:8000"
    volumes:
      - /mnt/user/appdata/ai-models:/root/.cache/huggingface
    environment:
      - CUDA_VISIBLE_DEVICES=0
      - HF_HOME=/root/.cache/huggingface
    command:
      - --model
      - Qwen/Qwen2.5-7B-Instruct-AWQ
      - --quantization
      - awq
      - --dtype
      - half
      - --gpu-memory-utilization
      - "0.90"
      - --max-model-len
      - "8192"
      - --port
      - "8000"
      - --host
      - "0.0.0.0"
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              device_ids: ['0']
              capabilities: [gpu]

  # Embedding Service
  embeddings:
    image: ghcr.io/huggingface/text-embeddings-inference:1.5
    container_name: embeddings
    restart: unless-stopped
    networks:
      ai_internal:
        ipv4_address: 172.25.0.30
    ports:
      - "8001:80"
    volumes:
      - /mnt/user/appdata/ai-models:/data:ro
    command:
      - --model-id
      - /data/Alibaba-NLP/gte-Qwen2-1.5B-instruct
      - --port
      - "80"
      - --max-batch-tokens
      - "16384"
      - --dtype
      - float16
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              device_ids: ['0']
              capabilities: [gpu]

  # RAG Frontend - AnythingLLM
  anythingllm:
    image: mintplexlabs/anythingllm:latest
    container_name: anythingllm
    restart: unless-stopped
    networks:
      ai_internal:
        ipv4_address: 172.25.0.40
    ports:
      - "3002:3001"
    volumes:
      - /mnt/user/appdata/anythingllm:/app/server/storage
      - /mnt/user/appdata/anythingllm/hotdir:/app/collector/hotdir
    environment:
      - STORAGE_DIR=/app/server/storage
      - LLM_PROVIDER=generic-openai
      - GENERIC_OPEN_AI_BASE_PATH=http://172.25.0.20:8000/v1
      - GENERIC_OPEN_AI_MODEL_PREF=Qwen/Qwen2.5-7B-Instruct-AWQ
      - GENERIC_OPEN_AI_MODEL_TOKEN_LIMIT=8192
      - EMBEDDING_ENGINE=generic-openai
      - EMBEDDING_BASE_PATH=http://172.25.0.30:80
      - EMBEDDING_MODEL_PREF=Alibaba-NLP/gte-Qwen2-1.5B-instruct
      - VECTOR_DB=qdrant
      - QDRANT_ENDPOINT=http://172.25.0.10:6333
      - AUTH_TOKEN=Ede542514dff5ed67b886e4a6cc79b4f5be48bc612e9e5c23b512f35b2a2ee5c
      - JWT_SECRET=4c3c327464046e01c00dac098e0543f04ce3b802f506a1bcbf25e3193b7ab792
