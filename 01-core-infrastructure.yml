###############################################################################
# 01-core-infrastructure.yml
# BRAWN (192.168.1.222) - Core Infrastructure Stack
# Deploy via: Portainer (192.168.1.222:8008) → Stacks → Add Stack
#
# Services: Homepage, Uptime Kuma, Dozzle, Node-RED, Mosquitto,
#           Glances, Watchtower, hass-unraid, Cloudflared
#
# Network: core_net (172.20.0.0/16)
###############################################################################

networks:
  core_net:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16

services:
  # ──────────────────────────────────────────────────────────
  # 🏠 Homepage - Dashboard
  # ──────────────────────────────────────────────────────────
  homepage:
    image: ghcr.io/gethomepage/homepage:latest
    container_name: homepage
    restart: unless-stopped
    environment:
      - TZ=America/New_York
      - PUID=99
      - PGID=100
    volumes:
      - /mnt/user/appdata/homepage:/app/config
      - /var/run/docker.sock:/var/run/docker.sock:ro
    ports:
      - "8010:3000"
    networks:
      core_net:
        ipv4_address: 172.20.0.10
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000"]
      interval: 60s
      timeout: 5s
      retries: 3
      start_period: 15s

  # ──────────────────────────────────────────────────────────
  # 💓 Uptime Kuma - Service Monitoring
  # ──────────────────────────────────────────────────────────
  uptime-kuma:
    image: louislam/uptime-kuma:1
    container_name: uptime-kuma
    restart: unless-stopped
    environment:
      - TZ=America/New_York
    volumes:
      - /mnt/user/appdata/uptime-kuma:/app/data
    ports:
      - "3010:3001"
    networks:
      core_net:
        ipv4_address: 172.20.0.11
    healthcheck:
      test: ["CMD-SHELL", "node -e \"require('http').get('http://localhost:3001/api/entry', (r) => { process.exit(r.statusCode === 200 ? 0 : 1) })\""]
      interval: 60s
      timeout: 10s
      retries: 5
      start_period: 20s

  # ──────────────────────────────────────────────────────────
  # 📋 Dozzle - Docker Log Viewer
  # ──────────────────────────────────────────────────────────
  dozzle:
    image: amir20/dozzle:latest
    container_name: dozzle
    restart: unless-stopped
    environment:
      - TZ=America/New_York
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    ports:
      - "9999:8080"
    networks:
      core_net:
        ipv4_address: 172.20.0.12

  # ──────────────────────────────────────────────────────────
  # 🪄 Node-RED - Automation Engine
  # ──────────────────────────────────────────────────────────
  nodered:
    image: nodered/node-red:4
    container_name: nodered
    restart: unless-stopped
    environment:
      - TZ=America/New_York
      - NODE_RED_ENABLE_PROJECTS=true
      - NODE_RED_ENABLE_SAFE_MODE=false
    volumes:
      - /mnt/user/appdata/nodered:/data
    ports:
      - "1880:1880"
    networks:
      core_net:
        ipv4_address: 172.20.0.13
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:1880"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 30s

  # ──────────────────────────────────────────────────────────
  # 📡 Mosquitto - MQTT Broker
  # ──────────────────────────────────────────────────────────
  mosquitto:
    image: eclipse-mosquitto:2
    container_name: mosquitto
    restart: unless-stopped
    environment:
      - TZ=America/New_York
    volumes:
      - /mnt/user/appdata/mosquitto/config:/mosquitto/config
      - /mnt/user/appdata/mosquitto/data:/mosquitto/data
      - /mnt/user/appdata/mosquitto/log:/mosquitto/log
    ports:
      - "1883:1883"
      - "9001:9001"
    networks:
      core_net:
        ipv4_address: 172.20.0.14
    healthcheck:
      test: ["CMD", "mosquitto_sub", "-t", "$$SYS/#", "-C", "1", "-i", "healthcheck", "-W", "3"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # ──────────────────────────────────────────────────────────
  # 🔗 Hass-Unraid - MQTT Bridge to Home Assistant
  # ──────────────────────────────────────────────────────────
  hass-unraid:
    image: ghcr.io/idmedia/hass-unraid:latest
    container_name: hass-unraid
    restart: unless-stopped
    environment:
      - TZ=America/New_York
    volumes:
      - /mnt/user/appdata/hass-unraid/data:/data
    networks:
      core_net:
        ipv4_address: 172.20.0.15
    depends_on:
      mosquitto:
        condition: service_healthy

  # ──────────────────────────────────────────────────────────
  # 📊 Glances - System Monitor
  # ──────────────────────────────────────────────────────────
  glances:
    image: nicolargo/glances:latest-full
    container_name: glances
    restart: unless-stopped
    environment:
      - TZ=America/New_York
      - GLANCES_OPT=-w
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /mnt/user/appdata/glances:/glances/conf
    ports:
      - "61208:61208"
    pid: host
    networks:
      core_net:
        ipv4_address: 172.20.0.16
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:61208/api/4/cpu"]
      interval: 60s
      timeout: 5s
      retries: 3

  # ──────────────────────────────────────────────────────────
  # 🔄 Watchtower - Auto-Update Containers
  # ──────────────────────────────────────────────────────────
  watchtower:
    image: containrrr/watchtower:latest
    container_name: watchtower
    restart: unless-stopped
    environment:
      - TZ=America/New_York
      - WATCHTOWER_CLEANUP=true
      - WATCHTOWER_SCHEDULE=0 0 4 * * *
      - WATCHTOWER_LABEL_ENABLE=true
      - WATCHTOWER_ROLLING_RESTART=true
      - WATCHTOWER_TIMEOUT=60s
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    networks:
      core_net:
        ipv4_address: 172.20.0.17

  # ──────────────────────────────────────────────────────────
  # 🌐 Cloudflared - Tunnel (if using CF tunnels)
  # ──────────────────────────────────────────────────────────
  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: cloudflared
    restart: unless-stopped
    environment:
      - TZ=America/New_York
    command: tunnel --no-autoupdate run
    volumes:
      - /mnt/user/appdata/cloudflared:/etc/cloudflared
    networks:
      core_net:
        ipv4_address: 172.20.0.18

  # ──────────────────────────────────────────────────────────
  # 🔍 SearXNG - Private Search Engine
  # ──────────────────────────────────────────────────────────
  searxng:
    image: searxng/searxng:latest
    container_name: searxng
    restart: unless-stopped
    environment:
      - TZ=America/New_York
      - SEARXNG_BASE_URL=http://192.168.1.222:8888
    volumes:
      - /mnt/user/appdata/searxng:/etc/searxng
    ports:
      - "8888:8080"
    networks:
      core_net:
        ipv4_address: 172.20.0.19
    depends_on:
      - searxng-redis

  searxng-redis:
    image: redis:7-alpine
    container_name: searxng-redis
    restart: unless-stopped
    command: redis-server --save 30 1 --loglevel warning
    volumes:
      - /mnt/user/appdata/searxng-redis:/data
    networks:
      core_net:
        ipv4_address: 172.20.0.20

  # ──────────────────────────────────────────────────────────
  # 🧱 FlareSolverr - Cloudflare Bypass for Prowlarr
  # ──────────────────────────────────────────────────────────
  flaresolverr:
    image: ghcr.io/flaresolverr/flaresolverr:latest
    container_name: flaresolverr
    restart: unless-stopped
    environment:
      - TZ=America/New_York
      - LOG_LEVEL=info
    ports:
      - "8191:8191"
    networks:
      core_net:
        ipv4_address: 172.20.0.21

  # ──────────────────────────────────────────────────────────
  # 🌐 Browserless - Headless Chrome
  # ──────────────────────────────────────────────────────────
  browserless:
    image: ghcr.io/browserless/chromium:latest
    container_name: browserless
    restart: unless-stopped
    environment:
      - TZ=America/New_York
      - MAX_CONCURRENT_SESSIONS=5
      - CONNECTION_TIMEOUT=60000
    ports:
      - "3100:3000"
    networks:
      core_net:
        ipv4_address: 172.20.0.22
