###############################################################################
# brain-stack.yml
# NODE B (Brain) - Pop!_OS | Ultra 9 285K | RX 7900 XT 20GB | 128GB DDR5
#
# Deploy via Docker Compose: docker compose -f brain-stack.yml up -d
# Deploy via Portainer: See PORTAINER-DEPLOY.md for detailed instructions
# Setup (REQUIRED before deployment): bash brain-setup.sh
#
# IMPORTANT: Run brain-setup.sh BEFORE deploying this stack to:
#   - Create required directories (/home/brains/*)
#   - Generate SearXNG configuration
#   - Validate system prerequisites
#   - Clean up old containers/networks
#
# GPU BUDGET (RX 7900 XT 20GB via ROCm):
#   vLLM:       ~18GB (90%) -- large quantized models up to 70B Q4
#   Buffer:     ~2GB
#
# CPU SERVICES (no GPU needed -- uses 128GB system RAM):
#   Qdrant:     Vector database for RAG
#   TEI:        Text embedding inference (CPU mode, Qwen3-Embedding-0.6B)
#   SearXNG:    Privacy-respecting metasearch for web RAG
#   OpenWebUI:  Chat interface with full RAG support
#
# PORTS:
#   8000  - vLLM OpenAI-compatible API (primary model)
#   6333  - Qdrant HTTP API
#   6334  - Qdrant gRPC API
#   8001  - TEI Embeddings API
#   8888  - SearXNG search
#   3000  - OpenWebUI (Brain-local)
#
# HEALTHCHECK TIMINGS:
#   - vLLM: 240s start period (model loading to GPU)
#   - TEI Embeddings: 300s start period (model download ~1.2GB + loading)
#   - Qdrant: 20s start period (quick database init)
#   - SearXNG: 15s start period (lightweight service)
#   - OpenWebUI: 60s start period (depends on other services)
###############################################################################

networks:
  brain_net:
    driver: bridge
    ipam:
      config:
        - subnet: 172.31.0.0/16

services:
  # ---------------------------------------------------------------
  # vLLM Primary - Heavy Model Inference (ROCm)
  # 90% of 20GB = ~18GB VRAM
  # Swap models by changing --model and restarting
  # ---------------------------------------------------------------
  vllm:
    image: vllm/vllm-openai:v0.15.1

    container_name: brain-vllm
    restart: unless-stopped
    environment:
      - HF_HOME=/root/.cache/huggingface
      - HSA_OVERRIDE_GFX_VERSION=11.0.0
      - ROCM_PATH=/opt/rocm
      - PYTORCH_ROCM_ARCH=gfx1100
      - HIP_VISIBLE_DEVICES=0
      - VLLM_ROCM_USE_AITER=1
      - VLLM_ROCM_USE_AITER_RMSNORM=1
      - VLLM_ROCM_USE_AITER_MOE=1
      - VLLM_USE_TRITON_FLASH_ATTN=0
      - HIP_FORCE_DEV_KERNARG=1
    volumes:
      - /home/brains/ai-models:/root/.cache/huggingface
    ports:
      - "8000:8000"
    command:
      - --model
      - cognitivecomputations/dolphin-2.9.3-llama-3.1-8b-AWQ
      - --quantization
      - awq
      - --dtype
      - half
      - --gpu-memory-utilization
      - "0.90"
      - --max-model-len
      - "16384"
      - --max-num-seqs
      - "16"
      - --port
      - "8000"
      - --host
      - "0.0.0.0"
      - --device
      - auto
      - --enable-auto-tool-choice
      - --tool-call-parser
      - hermes
    networks:
      brain_net:
        ipv4_address: 172.31.0.10
    devices:
      - /dev/kfd:/dev/kfd
      - /dev/dri:/dev/dri
    group_add:
      - video
      - "992"
    ipc: host
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 240s

  # ---------------------------------------------------------------
  # vLLM Secondary (OPTIONAL - uncomment to run 2 models)
  # Split: primary 50% + secondary 40% = 90% total
  # To enable: uncomment below AND change primary to 0.50
  # ---------------------------------------------------------------
  # vllm-secondary:
  #   image: vllm/vllm-openai:latest
  #   container_name: brain-vllm-secondary
  #   restart: unless-stopped
  #   environment:
  #     - HF_HOME=/root/.cache/huggingface
  #     - HSA_OVERRIDE_GFX_VERSION=11.0.0
  #     - ROCM_PATH=/opt/rocm
  #     - PYTORCH_ROCM_ARCH=gfx1100
  #     - HIP_VISIBLE_DEVICES=0
  #     - VLLM_ROCM_USE_AITER=1
  #     - VLLM_ROCM_USE_AITER_RMSNORM=1
  #     - VLLM_ROCM_USE_AITER_MOE=1
  #     - VLLM_USE_TRITON_FLASH_ATTN=0
  #     - HIP_FORCE_DEV_KERNARG=1
  #   volumes:
  #     - /home/brains/ai-models:/root/.cache/huggingface
  #   ports:
  #     - "8001:8000"
  #   command:
  #     - --model
  #     - Qwen/Qwen2.5-7B-Instruct-AWQ
  #     - --quantization
  #     - awq
  #     - --dtype
  #     - half
  #     - --gpu-memory-utilization
  #     - "0.40"
  #     - --max-model-len
  #     - "8192"
  #     - --port
  #     - "8000"
  #     - --host
  #     - "0.0.0.0"
  #     - --device
  #     - auto
  #   networks:
  #     brain_net:
  #       ipv4_address: 172.31.0.11
  #   devices:
  #     - /dev/kfd:/dev/kfd
  #     - /dev/dri:/dev/dri
  #   group_add:
  #     - video
  #     - "992"
  #   ipc: host
  #   healthcheck:
  #     test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
  #     interval: 30s
  #     timeout: 10s
  #     retries: 5
  #     start_period: 240s

  # ---------------------------------------------------------------
  # Qdrant - Vector Database for RAG
  # CPU-only, uses system RAM for indexing
  # ---------------------------------------------------------------
  qdrant:
    image: qdrant/qdrant:v1.13.2
    container_name: brain-qdrant
    restart: unless-stopped
    environment:
      - QDRANT__SERVICE__HTTP_PORT=6333
      - QDRANT__SERVICE__GRPC_PORT=6334
    volumes:
      - /home/brains/qdrant/storage:/qdrant/storage
      - /home/brains/qdrant/snapshots:/qdrant/snapshots
    ports:
      - "6333:6333"
      - "6334:6334"
    networks:
      brain_net:
        ipv4_address: 172.31.0.15
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6333/healthz"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  # ---------------------------------------------------------------
  # TEI Embeddings - Text Embedding Inference (CPU)
  # Runs on CPU to keep full GPU for vLLM
  # Ultra 9 285K + 128GB RAM handles 0.6B model easily
  # Model auto-downloads on first start (~1.2GB)
  # Extended start_period to allow for model download (3-5 min)
  # ---------------------------------------------------------------
  embeddings:
    image: ghcr.io/huggingface/text-embeddings-inference:cpu-1.5
    container_name: brain-embeddings
    restart: unless-stopped
    volumes:
      - /home/brains/embeddings-cache:/data
    ports:
      - "8001:80"
    command:
      - --model-id
      - Qwen/Qwen3-Embedding-0.6B
      - --port
      - "80"
      - --max-batch-tokens
      - "16384"
    networks:
      brain_net:
        ipv4_address: 172.31.0.20
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:80/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 300s

  # ---------------------------------------------------------------
  # SearXNG - Privacy-Respecting Metasearch
  # Provides web search for OpenWebUI RAG
  # Config generated by brain-setup.sh
  # ---------------------------------------------------------------
  searxng:
    image: searxng/searxng:latest
    container_name: brain-searxng
    restart: unless-stopped
    environment:
      - SEARXNG_BASE_URL=http://localhost:8888/
    volumes:
      - /home/brains/searxng:/etc/searxng
    ports:
      - "8888:8080"
    networks:
      brain_net:
        ipv4_address: 172.31.0.25
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/healthz"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  # ---------------------------------------------------------------
  # OpenWebUI - Brain-Local Chat Interface
  # Full RAG: local embeddings + Qdrant vectors + SearXNG web search
  # ---------------------------------------------------------------
  openwebui:
    image: ghcr.io/open-webui/open-webui:main
    container_name: brain-openwebui
    restart: unless-stopped
    environment:
      # LLM backends
      - OPENAI_API_BASE_URLS=http://172.31.0.10:8000/v1
      - OPENAI_API_KEYS=sk-brain-local
      - WEBUI_AUTH=true
      - WEBUI_NAME=Brain AI
      # RAG - Embeddings via local TEI
      - RAG_EMBEDDING_ENGINE=openai
      - RAG_OPENAI_API_BASE_URL=http://172.31.0.20:80/v1
      - RAG_OPENAI_API_KEY=sk-local
      - ENABLE_RAG_HYBRID_SEARCH=true
      # RAG - Web search via local SearXNG
      - ENABLE_RAG_WEB_SEARCH=true
      - RAG_WEB_SEARCH_ENGINE=searxng
      - SEARXNG_QUERY_URL=http://172.31.0.25:8080/search?q=<query>
    volumes:
      - /home/brains/openwebui:/app/backend/data
    ports:
      - "3000:8080"
    networks:
      brain_net:
        ipv4_address: 172.31.0.30
    depends_on:
      vllm:
        condition: service_healthy
      qdrant:
        condition: service_healthy
      embeddings:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
