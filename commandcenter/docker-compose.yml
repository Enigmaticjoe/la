version: "3.8"

name: commandcenter

services:
  ollama:
    image: ollama/ollama:latest
    container_name: commandcenter_ollama
    restart: unless-stopped
    ports:
      - "11434:11434"
    volumes:
      - ollama_models:/root/.ollama
      - /etc/localtime:/etc/localtime:ro
    environment:
      - OLLAMA_HOST=0.0.0.0
      - OLLAMA_ORIGINS=*
      - OLLAMA_KEEP_ALIVE=-1
      - ZES_ENABLE_SYSMAN=1
      - OLLAMA_NUM_GPU=999
    devices:
      - /dev/dri:/dev/dri
    group_add:
      - video
      - render

  chimera_face:
    image: ghcr.io/open-webui/open-webui:main
    container_name: chimera_face
    restart: unless-stopped
    ports:
      - "3000:8080"
    volumes:
      - openwebui_data:/app/backend/data
    environment:
      - OLLAMA_BASE_URL=http://ollama:11434
      - WEBUI_AUTH=false
      - ENABLE_SIGNUP=true
    depends_on:
      - ollama

volumes:
  ollama_models:
  openwebui_data:
