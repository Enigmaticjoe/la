# ============================================================
# PROJECT CHIMERA: NEURAL STACK - ENHANCED EDITION
# Ubuntu Server 25.10 @ 192.168.1.9 (Brain Node)
# Integrated with Unraid @ 192.168.1.222 (22TB Storage)
# ============================================================
# Deploy with: docker compose -f docker-compose-enhanced.yml up -d
# ============================================================

name: chimera

networks:
  chimera_net:
    driver: bridge
    ipam:
      config:
        - subnet: 172.28.0.0/16

  # External network for Unraid communication
  external_net:
    driver: bridge

volumes:
  ollama_models:
  qdrant_data:
  openwebui_data:
  comfyui_models:
  comfyui_output:
  alltalk_voices:
  searxng_data:
  postgres_data:
  redis_data:
  filebrowser_data:

services:
  # ============================================================
  # NEURAL CORE: Ollama LLM Engine
  # ============================================================
  chimera_brain:
    image: ollama/ollama:latest
    container_name: chimera_brain
    hostname: chimera_brain
    restart: unless-stopped
    ports:
      - "11434:11434"
    volumes:
      - ollama_models:/root/.ollama
      - /etc/localtime:/etc/localtime:ro
      # Optional: Use Unraid for model storage if needed
      # - /mnt/unraid/chimera/ollama_models:/root/.ollama
    environment:
      - OLLAMA_HOST=0.0.0.0
      - OLLAMA_ORIGINS=*
      - OLLAMA_KEEP_ALIVE=-1
      - OLLAMA_MAX_LOADED_MODELS=3
      - OLLAMA_NUM_PARALLEL=4
      - NVIDIA_VISIBLE_DEVICES=all
      - CUDA_VISIBLE_DEVICES=0
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    networks:
      chimera_net:
        ipv4_address: 172.28.0.10
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:11434/api/tags"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

  # ============================================================
  # MEMORY: Qdrant Vector Database
  # ============================================================
  chimera_memory:
    image: qdrant/qdrant:latest
    container_name: chimera_memory
    hostname: chimera_memory
    restart: unless-stopped
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
      # Store vectors on Unraid for persistence
      - /mnt/unraid/chimera/qdrant:/qdrant/storage/backup
    environment:
      - QDRANT__SERVICE__GRPC_PORT=6334
      - QDRANT__LOG_LEVEL=INFO
      - QDRANT__STORAGE__PERFORMANCE__OPTIMIZERS_ENABLED=true
    networks:
      chimera_net:
        ipv4_address: 172.28.0.11
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6333/"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ============================================================
  # POSTGRES: Relational Database for Metadata & Tracking
  # ============================================================
  chimera_postgres:
    image: postgres:16-alpine
    container_name: chimera_postgres
    hostname: chimera_postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - /mnt/unraid/chimera/postgres_backup:/backup
    environment:
      - POSTGRES_DB=chimera
      - POSTGRES_USER=chimera
      - POSTGRES_PASSWORD=chimera_secure_password_change_me
      - PGDATA=/var/lib/postgresql/data/pgdata
    networks:
      chimera_net:
        ipv4_address: 172.28.0.19
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U chimera"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ============================================================
  # REDIS: Caching & Message Queue
  # ============================================================
  chimera_redis:
    image: redis:7-alpine
    container_name: chimera_redis
    hostname: chimera_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes --maxmemory 4gb --maxmemory-policy allkeys-lru
    networks:
      chimera_net:
        ipv4_address: 172.28.0.20
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ============================================================
  # FACE: Open WebUI Chat Interface
  # ============================================================
  chimera_face:
    image: ghcr.io/open-webui/open-webui:main
    container_name: chimera_face
    hostname: chimera_face
    restart: unless-stopped
    ports:
      - "3000:8080"
    volumes:
      - openwebui_data:/app/backend/data
      - /mnt/unraid/chimera/documents:/app/backend/data/docs
    environment:
      - OLLAMA_BASE_URL=http://chimera_brain:11434
      - WEBUI_AUTH=false
      - WEBUI_NAME=Chimera AI Brain
      - ENABLE_SIGNUP=true
      - ENABLE_RAG_WEB_SEARCH=true
      - RAG_WEB_SEARCH_ENGINE=searxng
      - SEARXNG_QUERY_URL=http://chimera_search:8080/search?q=<query>&format=json
      - ENABLE_IMAGE_GENERATION=true
      - AUTOMATIC1111_BASE_URL=http://chimera_artist:8188
      - COMFYUI_BASE_URL=http://chimera_artist:8188
      - ENABLE_RAG_LOCAL_WEB_FETCH=true
      - WEBUI_BANNERS=[{"id":"unraid","content":"📦 22TB Unraid Storage Connected","dismissible":true,"timestamp":0}]
    depends_on:
      chimera_brain:
        condition: service_healthy
      chimera_search:
        condition: service_started
      chimera_memory:
        condition: service_healthy
    networks:
      chimera_net:
        ipv4_address: 172.28.0.12
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ============================================================
  # SEARCH: SearXNG Privacy Search Engine
  # ============================================================
  chimera_search:
    image: searxng/searxng:latest
    container_name: chimera_search
    hostname: chimera_search
    restart: unless-stopped
    ports:
      - "8081:8080"
    volumes:
      - ./config/searxng:/etc/searxng:rw
      - searxng_data:/var/searxng
    environment:
      - SEARXNG_BASE_URL=http://192.168.1.9:8081
      - INSTANCE_NAME=Chimera Search
      - AUTOCOMPLETE=google
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - SETGID
      - SETUID
    networks:
      chimera_net:
        ipv4_address: 172.28.0.13
      external_net:

  # ============================================================
  # VOICE: AllTalk TTS Engine
  # ============================================================
  chimera_voice:
    image: erew123/alltalk_tts:latest
    container_name: chimera_voice
    hostname: chimera_voice
    restart: unless-stopped
    ports:
      - "8880:7851"
    volumes:
      - alltalk_voices:/app/voices
      - alltalk_voices:/app/outputs
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
      - CUDA_VISIBLE_DEVICES=0
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    networks:
      chimera_net:
        ipv4_address: 172.28.0.14
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:7851/api/ready"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 120s

  # ============================================================
  # ARTIST: ComfyUI Image Generation
  # ============================================================
  chimera_artist:
    image: yanwk/comfyui-boot:latest
    container_name: chimera_artist
    hostname: chimera_artist
    restart: unless-stopped
    ports:
      - "8188:8188"
    volumes:
      - comfyui_models:/home/runner/ComfyUI/models
      - comfyui_output:/home/runner/ComfyUI/output
      - /mnt/unraid/chimera/comfyui_output:/home/runner/ComfyUI/output/archive
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
      - CLI_ARGS=--listen 0.0.0.0 --port 8188
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    networks:
      chimera_net:
        ipv4_address: 172.28.0.15
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8188/"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 180s

  # ============================================================
  # KNOWLEDGE HARVESTER: Web Scraping & Content Ingestion
  # ============================================================
  chimera_harvester:
    image: firecrawl/firecrawl:latest
    container_name: chimera_harvester
    hostname: chimera_harvester
    restart: unless-stopped
    ports:
      - "3002:3002"
    environment:
      - REDIS_URL=redis://chimera_redis:6379
      - PLAYWRIGHT_MICROSERVICE_URL=http://chimera_playwright:3000
      - PORT=3002
    depends_on:
      - chimera_redis
      - chimera_playwright
    networks:
      chimera_net:
        ipv4_address: 172.28.0.21

  # ============================================================
  # PLAYWRIGHT: Browser Automation for Web Scraping
  # ============================================================
  chimera_playwright:
    image: browserless/chrome:latest
    container_name: chimera_playwright
    hostname: chimera_playwright
    restart: unless-stopped
    ports:
      - "3003:3000"
    environment:
      - MAX_CONCURRENT_SESSIONS=5
      - CONNECTION_TIMEOUT=60000
      - ENABLE_DEBUGGER=false
    networks:
      chimera_net:
        ipv4_address: 172.28.0.22

  # ============================================================
  # LIBRARIAN: Document Processing & OCR
  # ============================================================
  chimera_librarian:
    image: ghcr.io/paperless-ngx/paperless-ngx:latest
    container_name: chimera_librarian
    hostname: chimera_librarian
    restart: unless-stopped
    ports:
      - "8082:8000"
    volumes:
      - /mnt/unraid/chimera/documents:/usr/src/paperless/media
      - /mnt/unraid/chimera/documents/consume:/usr/src/paperless/consume
      - /mnt/unraid/chimera/documents/export:/usr/src/paperless/export
      - ./config/paperless:/usr/src/paperless/data
    environment:
      - PAPERLESS_REDIS=redis://chimera_redis:6379
      - PAPERLESS_DBHOST=chimera_postgres
      - PAPERLESS_DBNAME=chimera
      - PAPERLESS_DBUSER=chimera
      - PAPERLESS_DBPASS=chimera_secure_password_change_me
      - PAPERLESS_SECRET_KEY=change-this-to-a-long-random-string
      - PAPERLESS_URL=http://192.168.1.9:8082
      - PAPERLESS_OCR_LANGUAGE=eng
      - PAPERLESS_TIME_ZONE=America/New_York
      - PAPERLESS_CONSUMER_POLLING=60
      - PAPERLESS_OCR_USER_ARGS={"optimize": 1, "pdfa_image_compression": "lossless"}
    depends_on:
      - chimera_postgres
      - chimera_redis
    networks:
      chimera_net:
        ipv4_address: 172.28.0.23

  # ============================================================
  # ARCHIVIST: YouTube & Media Downloader
  # ============================================================
  chimera_archivist:
    image: alexta69/metube:latest
    container_name: chimera_archivist
    hostname: chimera_archivist
    restart: unless-stopped
    ports:
      - "8083:8081"
    volumes:
      - /mnt/unraid/chimera/media/downloads:/downloads
      - /mnt/unraid/chimera/media/audio:/downloads/audio
    environment:
      - UID=1000
      - GID=1000
      - DOWNLOAD_DIR=/downloads
      - AUDIO_DOWNLOAD_DIR=/downloads/audio
      - STATE_DIR=/downloads/.metube
      - YTDL_OPTIONS={"writesubtitles":true,"subtitleslangs":["en"],"writeautomaticsub":true}
    networks:
      chimera_net:
        ipv4_address: 172.28.0.24

  # ============================================================
  # FILE MANAGER: Web-based File Browser for Unraid Storage
  # ============================================================
  chimera_files:
    image: filebrowser/filebrowser:latest
    container_name: chimera_files
    hostname: chimera_files
    restart: unless-stopped
    ports:
      - "8084:80"
    volumes:
      - /mnt/unraid:/srv/unraid
      - /mnt/unraid/chimera:/srv/chimera
      - filebrowser_data:/database
      - ./config/filebrowser:/config
    environment:
      - FB_DATABASE=/database/filebrowser.db
      - FB_ROOT=/srv
    networks:
      chimera_net:
        ipv4_address: 172.28.0.25

  # ============================================================
  # KNOWLEDGE PIPELINE: RAG Document Processor
  # ============================================================
  chimera_rag_processor:
    build:
      context: ./agents/rag_processor
      dockerfile: Dockerfile
    container_name: chimera_rag_processor
    hostname: chimera_rag_processor
    restart: unless-stopped
    ports:
      - "8085:8000"
    volumes:
      - /mnt/unraid/chimera/documents:/data/documents:ro
      - /mnt/unraid/chimera/knowledge:/data/knowledge
      - ./config/rag:/config
    environment:
      - OLLAMA_API=http://chimera_brain:11434
      - QDRANT_URL=http://chimera_memory:6333
      - POSTGRES_URL=postgresql://chimera:chimera_secure_password_change_me@chimera_postgres:5432/chimera
      - REDIS_URL=redis://chimera_redis:6379
      - EMBEDDING_MODEL=nomic-embed-text
      - CHUNK_SIZE=1000
      - CHUNK_OVERLAP=200
      - BATCH_SIZE=32
    depends_on:
      - chimera_brain
      - chimera_memory
      - chimera_postgres
      - chimera_redis
    networks:
      chimera_net:
        ipv4_address: 172.28.0.26

  # ============================================================
  # SENTINEL: Self-Healing & Monitoring Agent
  # ============================================================
  chimera_sentinel:
    build:
      context: ./agents/sentinel
      dockerfile: Dockerfile
    container_name: chimera_sentinel
    hostname: chimera_sentinel
    restart: unless-stopped
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./logs:/logs
    environment:
      - OLLAMA_API=http://chimera_brain:11434/api/generate
      - MODEL=llama3.2
      - LOG_LEVEL=INFO
      - CHECK_INTERVAL=300
      - UNRAID_IP=192.168.1.222
      - POSTGRES_URL=postgresql://chimera:chimera_secure_password_change_me@chimera_postgres:5432/chimera
    depends_on:
      chimera_brain:
        condition: service_healthy
    networks:
      chimera_net:
        ipv4_address: 172.28.0.17
      external_net:

  # ============================================================
  # DASHBOARD: Homepage Mission Control
  # ============================================================
  chimera_dashboard:
    image: ghcr.io/gethomepage/homepage:latest
    container_name: chimera_dashboard
    hostname: chimera_dashboard
    restart: unless-stopped
    ports:
      - "3001:3000"
    volumes:
      - ./config/homepage:/app/config
      - /var/run/docker.sock:/var/run/docker.sock:ro
    environment:
      - PUID=1000
      - PGID=1000
    networks:
      chimera_net:
        ipv4_address: 172.28.0.18

  # ============================================================
  # WHISPER: Speech-to-Text Service
  # ============================================================
  chimera_whisper:
    image: onerahmet/openai-whisper-asr-webservice:latest
    container_name: chimera_whisper
    hostname: chimera_whisper
    restart: unless-stopped
    ports:
      - "9000:9000"
    environment:
      - ASR_MODEL=base
      - ASR_ENGINE=openai_whisper
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    networks:
      chimera_net:
        ipv4_address: 172.28.0.27

  # ============================================================
  # WATCHTOWER: Auto-update Docker Containers
  # ============================================================
  chimera_watchtower:
    image: containrrr/watchtower:latest
    container_name: chimera_watchtower
    hostname: chimera_watchtower
    restart: unless-stopped
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      - WATCHTOWER_CLEANUP=true
      - WATCHTOWER_INCLUDE_RESTARTING=true
      - WATCHTOWER_SCHEDULE=0 0 3 * * SUN
      - WATCHTOWER_NOTIFICATIONS=shoutrrr
      - WATCHTOWER_NOTIFICATION_URL=generic://192.168.1.9:8085/webhook/watchtower
    networks:
      chimera_net:
        ipv4_address: 172.28.0.28

  # ============================================================
  # MODEL BOOTSTRAP: Auto-pull essential models on startup
  # ============================================================
  chimera_bootstrap:
    image: curlimages/curl:latest
    container_name: chimera_bootstrap
    depends_on:
      chimera_brain:
        condition: service_healthy
    restart: "no"
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        echo "🧠 Bootstrapping Chimera Neural Models..."
        sleep 10

        # Pull essential models
        echo "📦 Pulling llama3.2 (fast reasoning)..."
        curl -s -X POST http://chimera_brain:11434/api/pull -d '{"name": "llama3.2"}'

        echo "📦 Pulling nomic-embed-text (embeddings)..."
        curl -s -X POST http://chimera_brain:11434/api/pull -d '{"name": "nomic-embed-text"}'

        echo "📦 Pulling llama3.1:8b (main assistant)..."
        curl -s -X POST http://chimera_brain:11434/api/pull -d '{"name": "llama3.1:8b"}'

        echo "📦 Pulling dolphin-mistral (uncensored chat)..."
        curl -s -X POST http://chimera_brain:11434/api/pull -d '{"name": "dolphin-mistral"}'

        echo "📦 Pulling deepseek-coder:6.7b (coding assistant)..."
        curl -s -X POST http://chimera_brain:11434/api/pull -d '{"name": "deepseek-coder:6.7b"}'

        echo "✅ Bootstrap complete! Models ready for use."
    networks:
      - chimera_net
